<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Neon Runner</title>
    <style>
      /* On enlève les marges et on cache les barres de défilement
         pour que la 3D prenne tout l'écran. */
      body {
        margin: 0;
        overflow: hidden;
      }

      /* Le panneau "GAME OVER", posé par-dessus la 3D.
         Caché au départ (display: none), on l'affichera au crash. */
      #gameover {
        display: none;                 /* invisible tant qu'on n'a pas perdu */
        position: fixed;               /* collé à l'écran, par-dessus le jeu */
        inset: 0;                      /* prend tout l'écran */
        align-items: center;           /* centre verticalement */
        justify-content: center;       /* centre horizontalement */
        flex-direction: column;
        background: rgba(0, 0, 0, 0.6); /* voile noir semi-transparent */
        color: #ff0033;                /* rouge, comme les obstacles */
        font-family: sans-serif;
        font-size: 64px;
        text-shadow: 0 0 20px #ff0033;  /* petite lueur néon */
      }
    </style>

    <!-- L'importmap dit au navigateur où trouver "three" :
         on le charge depuis un CDN (un site qui héberge la bibliothèque). -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
      }
    </script>
  </head>

  <body>
    <!-- Le panneau de fin de partie (caché tant qu'on n'a pas perdu). -->
    <div id="gameover">GAME OVER</div>

    <!-- type="module" : ce script peut "importer" d'autres morceaux de code. -->
    <script type="module">
      import * as THREE from "three";

      // 🎬 LA SCÈNE : le décor où l'on place les objets.
      const scene = new THREE.Scene();

      // 📷 LA CAMÉRA : l'œil par lequel on regarde la scène.
      const camera = new THREE.PerspectiveCamera(
        75,                                   // angle de vue (en degrés)
        window.innerWidth / window.innerHeight, // proportions de l'écran
        0.1,                                  // distance la plus proche visible
        1000                                  // distance la plus lointaine visible
      );
      // On place la caméra un peu en hauteur, et on la fait regarder
      // vers l'avant (le lointain), comme si on était dans un couloir.
      camera.position.set(0, 1.2, 5);   // x=centre, y=hauteur des yeux, z=un peu en arrière
      camera.lookAt(0, 0, -5);          // on regarde vers le fond de la scène

      // 🖼️ LE RENDERER : le "peintre" qui dessine l'image à l'écran.
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // ⚙️ RÉGLAGE : à quelle vitesse le sol défile vers nous.
      //    Plus le nombre est grand, plus on a l'impression d'aller vite.
      //    👉 Amuse-toi à changer cette valeur (ex : 0.02, puis 0.2) !
      const vitesseSol = 0.05;

      // 🟦 LE SOL : une grille de lignes (un quadrillage néon).
      //    Taille 20, divisée en 20 cases. La taille d'une case
      //    est ce qui rendra le défilement infini possible.
      const TAILLE = 20;
      const CASES = 20;
      // La taille d'une case, calculée à partir des deux valeurs ci-dessus.
      // Ainsi, si on change TAILLE ou CASES, le défilement reste juste.
      const tailleCase = TAILLE / CASES; // ici : 20 / 20 = 1
      const sol = new THREE.GridHelper(
        TAILLE,
        CASES,
        0x00ffff, // couleur de la ligne du milieu (cyan)
        0xff00ff  // couleur des autres lignes (magenta)
      );
      scene.add(sol);

      // 🟢 LE JOUEUR : un mesh = une FORME + une MATIÈRE (couleur).
      //    Forme : une petite boîte (largeur, hauteur, profondeur).
      const formeJoueur = new THREE.BoxGeometry(0.6, 0.6, 0.6);
      //    Matière : une couleur qui n'a pas besoin de lumière pour se voir
      //    (MeshBasicMaterial = "toujours visible", parfait pour le néon).
      const matiereJoueur = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
      //    On assemble la forme et la matière → le mesh "joueur".
      const joueur = new THREE.Mesh(formeJoueur, matiereJoueur);
      //    On le place : x=0 (centre), y=0.3 (posé sur le sol), z=3 (près de nous).
      joueur.position.set(0, 0.3, 3);
      scene.add(joueur);

      // 🔴 LES OBSTACLES : des mesh (forme + couleur), comme le joueur.
      //    Forme et matière sont les MÊMES pour tous : on les crée une fois,
      //    puis on les réutilise pour chaque cube (c'est plus économe).
      const formeObstacle = new THREE.BoxGeometry(0.8, 0.8, 0.8);
      const matiereObstacle = new THREE.MeshBasicMaterial({ color: 0xff0033 });

      // 🔴 RÉGLAGE : à quelle vitesse les obstacles foncent vers nous.
      //    👉 Plus c'est grand, plus c'est dur. Essaie 0.1, puis 0.25 !
      const vitesseObstacle = 0.15;

      // 🔴 RÉGLAGE : combien d'obstacles en même temps dans le couloir.
      //    👉 Essaie 1, puis 5 : le couloir se remplit !
      const NB_OBSTACLES = 3;

      // 🔴 RÉGLAGE : la profondeur (z) à laquelle un obstacle a disparu
      //    DERRIÈRE la caméra. Au-delà, on le recycle au fond.
      const zDisparition = 6;

      // 🎲 UNE RECETTE (fonction) : envoyer un obstacle TOUT AU FOND,
      //    sur une voie (gauche / centre / droite) tirée au hasard.
      function placerAuFond(obstacle) {
        // Math.random() donne un nombre au hasard entre 0 et 1.
        // (Math.random() * 5) → entre 0 et 5 ; "- 2.5" → entre -2.5 et +2.5.
        // Résultat : une position x au hasard sur toute la largeur du couloir.
        obstacle.position.x = Math.random() * 5 - 2.5;
        obstacle.position.z = -20;
      }

      // 📦 LE TABLEAU : une liste qui va contenir tous nos obstacles.
      const obstacles = [];

      // On fabrique NB_OBSTACLES cubes, espacés au départ pour ne pas
      // tous arriver collés. La boucle "for" répète NB_OBSTACLES fois.
      for (let i = 0; i < NB_OBSTACLES; i++) {
        const obstacle = new THREE.Mesh(formeObstacle, matiereObstacle);
        obstacle.position.y = 0.4;          // posé sur le sol
        placerAuFond(obstacle);              // voie au hasard, z = -20
        obstacle.position.z -= i * 8;        // on décale chacun plus loin
        scene.add(obstacle);                 // on l'ajoute à la scène
        obstacles.push(obstacle);            // ...et au tableau
      }

      // 🏁 L'ÉTAT DU JEU : tant que c'est false, on joue.
      //    Au crash, on le passe à true et la boucle gèle tout.
      let partieFinie = false;

      // Un raccourci vers le panneau "GAME OVER" du HTML, pour l'afficher.
      const panneauGameOver = document.getElementById("gameover");

      // 💥 RÉGLAGE : à quelle distance on considère que ça "touche".
      //    Plus c'est petit, plus il faut être pile dessus pour perdre.
      //    👉 Essaie 0.5 (plus permissif) ou 0.9 (plus sévère).
      const distanceCollision = 0.7;

      // 🎮 RÉGLAGE : à quelle vitesse le joueur glisse sur les côtés.
      //    👉 À toi de l'ajuster plus tard (essaie 0.05, puis 0.3) !
      const vitesseJoueur = 0.12;

      // 🧱 RÉGLAGE : jusqu'où le joueur peut aller à gauche/droite avant
      //    de toucher le "mur invisible". On la règle À L'ŒIL : le but est
      //    que le cube s'arrête pile au bord de l'écran, sans en sortir.
      //    👉 À toi de tester : essaie 2.5, 3, 3.5... jusqu'à ce que ce soit parfait.
      const limiteJoueur = 2.5;

      // 🕹️ ÉCOUTER LE CLAVIER.
      //    On retient simplement quelles flèches sont enfoncées,
      //    dans une "boîte" (un objet) avec deux cases : gauche et droite.
      const touches = { gauche: false, droite: false };

      // keydown = une touche vient d'être ENFONCÉE → on lève le drapeau.
      window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft")  touches.gauche = true;
        if (e.key === "ArrowRight") touches.droite = true;
      });

      // keyup = une touche vient d'être RELÂCHÉE → on baisse le drapeau.
      window.addEventListener("keyup", (e) => {
        if (e.key === "ArrowLeft")  touches.gauche = false;
        if (e.key === "ArrowRight") touches.droite = false;
      });

      // 🔁 LA BOUCLE DE RENDU : rappelée ~60 fois par seconde.
      function animer() {
        requestAnimationFrame(animer); // redemande une nouvelle image

        // 🏁 SI LA PARTIE EST FINIE : on ne bouge plus rien.
        //    On dessine quand même l'image figée, puis on s'arrête là.
        if (partieFinie) {
          renderer.render(scene, camera);
          return;
        }

        // 🎮 DÉPLACER LE JOUEUR selon les flèches enfoncées.
        //    Flèche gauche → on diminue le x. Flèche droite → on augmente le x.
        if (touches.gauche) joueur.position.x -= vitesseJoueur;
        if (touches.droite) joueur.position.x += vitesseJoueur;

        // 🧱 LE MUR INVISIBLE : on empêche le joueur de sortir de l'écran.
        //    Si x dépasse la limite (à droite ou à gauche), on le ramène.
        if (joueur.position.x > limiteJoueur)  joueur.position.x = limiteJoueur;
        if (joueur.position.x < -limiteJoueur) joueur.position.x = -limiteJoueur;

        // 🔴 FAIRE AVANCER TOUS LES OBSTACLES vers nous.
        //    On parcourt le tableau et on traite chaque obstacle un par un.
        for (const obstacle of obstacles) {
          obstacle.position.z += vitesseObstacle;

          // Dès qu'il nous a dépassés (z plus grand que la caméra),
          // on le renvoie au fond sur une NOUVELLE voie au hasard.
          if (obstacle.position.z > zDisparition) {
            placerAuFond(obstacle);
          }

          // 💥 TEST DE COLLISION : l'écart en x ET l'écart en z.
          //    Math.abs = la distance "sans le signe" (toujours positive).
          const ecartX = Math.abs(joueur.position.x - obstacle.position.x);
          const ecartZ = Math.abs(joueur.position.z - obstacle.position.z);

          // Si les DEUX écarts sont petits en même temps → ça touche !
          if (ecartX < distanceCollision && ecartZ < distanceCollision) {
            partieFinie = true;                  // on gèle le jeu
            panneauGameOver.style.display = "flex"; // on affiche le panneau
          }
        }

        // On glisse le sol vers nous (vers les z positifs).
        sol.position.z += vitesseSol;

        // L'astuce du défilement infini : dès que le sol a glissé
        // d'une case complète, on le remet en arrière d'une case.
        // Comme toutes les cases sont identiques, le saut est invisible.
        if (sol.position.z >= tailleCase) {
          sol.position.z -= tailleCase;
        }

        renderer.render(scene, camera); // le peintre dessine l'image
      }

      animer(); // on lance la boucle
    </script>
  </body>
</html>
