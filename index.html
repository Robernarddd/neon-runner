<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Neon Runner</title>
    <style>
      /* On enlève les marges et on cache les barres de défilement
         pour que la 3D prenne tout l'écran. */
      body {
        margin: 0;
        overflow: hidden;
      }

      /* Le compteur de SCORE, posé en haut à gauche, par-dessus la 3D. */
      #score {
        position: fixed;               /* collé à l'écran, ne défile pas */
        top: 16px;                     /* à 16 pixels du haut */
        left: 16px;                    /* à 16 pixels de la gauche */
        color: #ffdd00;                /* jaune, comme les orbes */
        font-family: sans-serif;
        font-size: 28px;
        text-shadow: 0 0 12px #ffdd00; /* petite lueur néon */
      }

      /* Le meilleur score (record), juste sous le score, en cyan. */
      #meilleur {
        position: fixed;
        top: 52px;                     /* un peu plus bas que le score */
        left: 16px;
        color: #00ffff;                /* cyan, comme la grille du sol */
        font-family: sans-serif;
        font-size: 20px;
        text-shadow: 0 0 12px #00ffff;
      }

      /* Le panneau "GAME OVER", posé par-dessus la 3D.
         Caché au départ (display: none), on l'affichera au crash. */
      #gameover {
        display: none;                 /* invisible tant qu'on n'a pas perdu */
        position: fixed;               /* collé à l'écran, par-dessus le jeu */
        inset: 0;                      /* prend tout l'écran */
        align-items: center;           /* centre verticalement */
        justify-content: center;       /* centre horizontalement */
        flex-direction: column;
        background: rgba(0, 0, 0, 0.6); /* voile noir semi-transparent */
        color: #ff0033;                /* rouge, comme les obstacles */
        font-family: sans-serif;
        font-size: 64px;
        text-shadow: 0 0 20px #ff0033;  /* petite lueur néon */
      }

      /* L'écran d'ACCUEIL, posé par-dessus la 3D au démarrage.
         Affiché au départ (display: flex), on le cachera quand on lance la partie. */
      #accueil {
        display: flex;                 /* visible dès l'ouverture de la page */
        position: fixed;               /* collé à l'écran, par-dessus le jeu */
        inset: 0;                      /* prend tout l'écran */
        align-items: center;           /* centre verticalement */
        justify-content: center;       /* centre horizontalement */
        flex-direction: column;
        cursor: pointer;               /* le curseur "main" : ça invite à cliquer */
        background: rgba(0, 0, 0, 0.6); /* voile noir semi-transparent */
        font-family: sans-serif;
      }

      /* Le grand titre du jeu, en cyan néon. */
      #accueil .titre {
        color: #00ffff;
        font-size: 72px;
        text-shadow: 0 0 20px #00ffff;
      }

      /* La consigne "Appuie pour jouer", plus petite, en vert comme le joueur. */
      #accueil .consigne {
        color: #00ff88;
        font-size: 28px;
        margin-top: 24px;
        text-shadow: 0 0 12px #00ff88;
      }

      /* Le score final, sous "GAME OVER" : plus petit, en jaune comme les orbes. */
      #scoreFinal {
        color: #ffdd00;
        font-size: 32px;
        margin-top: 16px;
        text-shadow: 0 0 12px #ffdd00;
      }

      /* Le record, sous le score final : un peu plus petit, en cyan. */
      #recordFinal {
        color: #00ffff;
        font-size: 24px;
        margin-top: 8px;
        text-shadow: 0 0 12px #00ffff;
      }

      /* Le bouton "Rejouer" : un cadre néon cyan, transparent à l'intérieur. */
      #rejouer {
        margin-top: 32px;
        padding: 12px 32px;
        font-family: sans-serif;
        font-size: 28px;
        color: #00ffff;                 /* texte cyan */
        background: transparent;        /* pas de fond : on voit le jeu derrière */
        border: 2px solid #00ffff;      /* un trait cyan tout autour */
        border-radius: 8px;             /* coins arrondis */
        cursor: pointer;                /* le curseur "main" : ça invite à cliquer */
        text-shadow: 0 0 12px #00ffff;  /* lueur néon sur le texte */
        box-shadow: 0 0 12px #00ffff;   /* ...et une lueur autour du cadre */
      }

      /* Quand la souris passe DESSUS le bouton, on l'illumine un peu plus. */
      #rejouer:hover {
        background: rgba(0, 255, 255, 0.15);
      }
    </style>

    <!-- L'importmap dit au navigateur où trouver "three" :
         on le charge depuis un CDN (un site qui héberge la bibliothèque). -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>

  <body>
    <!-- Le compteur de score, affiché en permanence en haut à gauche. -->
    <div id="score">Score : 0</div>

    <!-- Le meilleur score (record), juste en dessous. -->
    <div id="meilleur">Record : 0</div>

    <!-- L'écran d'accueil, affiché au démarrage. On clique (ou on appuie
         sur une touche) pour lancer la partie. -->
    <div id="accueil">
      <div class="titre">NEON RUNNER</div>
      <div class="consigne">Appuie pour jouer</div>
    </div>

    <!-- Le panneau de fin de partie (caché tant qu'on n'a pas perdu).
         Il contient un titre, le score de la partie, et un bouton "Rejouer". -->
    <div id="gameover">
      <div class="titre">GAME OVER</div>
      <div id="scoreFinal">Score : 0</div>
      <div id="recordFinal">Record : 0</div>
      <button id="rejouer">Rejouer</button>
    </div>

    <!-- type="module" : ce script peut "importer" d'autres morceaux de code. -->
    <script type="module">
      import * as THREE from "three";
      // 🌟 LES OUTILS DU BLOOM (le halo lumineux), pris dans les "addons".
      //    - EffectComposer  = la chaîne de montage qui retouche l'image.
      //    - RenderPass      = le 1er poste : dessine la scène normalement.
      //    - UnrealBloomPass = le 2e poste : repère le lumineux et le fait briller.
      import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
      import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
      import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

      // 🎨 LES RÉGLAGES : on importe le thème choisi depuis le fichier de config.
      //    "theme" contient toutes les couleurs et vitesses. Pour changer
      //    l'ambiance, on modifie theme.js — JAMAIS ce fichier-ci (le moteur).
      import { theme } from "./theme.js";

      // 🎬 LA SCÈNE : le décor où l'on place les objets.
      const scene = new THREE.Scene();
      // La couleur du fond de la scène vient du thème.
      scene.background = new THREE.Color(theme.couleurFond);

      // 📷 LA CAMÉRA : l'œil par lequel on regarde la scène.
      const camera = new THREE.PerspectiveCamera(
        75,                                   // angle de vue (en degrés)
        window.innerWidth / window.innerHeight, // proportions de l'écran
        0.1,                                  // distance la plus proche visible
        1000                                  // distance la plus lointaine visible
      );
      // On place la caméra un peu en hauteur, et on la fait regarder
      // vers l'avant (le lointain), comme si on était dans un couloir.
      camera.position.set(0, 1.2, 5);   // x=centre, y=hauteur des yeux, z=un peu en arrière
      camera.lookAt(0, 0, -5);          // on regarde vers le fond de la scène

      // 💥 LA SECOUSSE D'ÉCRAN (screen shake).
      //    On retient la position de REPOS de la caméra (là où elle revient
      //    quand tout est calme). On la lira pour la décaler puis la remettre.
      const cameraReposX = camera.position.x;
      const cameraReposY = camera.position.y;

      // 💥 RÉGLAGE : la FORCE du tremblement au moment du choc.
      //    Petit = léger frisson ; grand = gros tremblement de terre.
      //    👉 Essaie 0.1 (discret) puis 0.5 (violent) !
      const FORCE_SECOUSSE = 0.25;

      // 💥 L'intensité ACTUELLE du tremblement. 0 = caméra immobile.
      //    "let" car elle CHANGE : on la monte au crash, puis elle redescend.
      let secousse = 0;

      // 🖼️ LE RENDERER : le "peintre" qui dessine l'image à l'écran.
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // 🌟 LE BLOOM : on remplace le dessin direct par une CHAÎNE DE MONTAGE.
      //    1) on crée la chaîne, branchée sur notre peintre (renderer) ;
      const composer = new EffectComposer(renderer);
      //    2) Poste 1 : dessiner la scène vue par la caméra, comme avant ;
      composer.addPass(new RenderPass(scene, camera));

      // 🌟 RÉGLAGES DU HALO — c'est TOI qui les ajusteras à l'œil !
      //    - FORCE   : l'intensité du halo. Petit = discret, grand = ça baigne dans la lumière.
      //    - ETALEMENT : à quel point le halo bave loin autour de l'objet.
      //    - SEUIL   : à partir de quelle luminosité un objet se met à briller.
      //                0 = tout brille ; plus on monte, plus il faut être lumineux.
      const FORCE_BLOOM = 0.6;
      const ETALEMENT_BLOOM = 0.5;
      const SEUIL_BLOOM = 0.1;

      //    3) Poste 2 : le poste qui fait briller. Le 1er réglage est la
      //       "résolution" du halo (la taille de l'écran), puis nos 3 réglages.
      const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        FORCE_BLOOM,
        ETALEMENT_BLOOM,
        SEUIL_BLOOM
      );
      composer.addPass(bloomPass);

      // 📐 S'ADAPTER À LA TAILLE DE LA FENÊTRE.
      //    Le navigateur envoie un signal "resize" à chaque fois que la
      //    fenêtre change de taille. On l'écoute et on refait les réglages :
      //    - on redonne à la caméra les bonnes PROPORTIONS (sinon l'image
      //      est étirée), puis on la "met à jour" pour qu'elle en tienne compte ;
      //    - on redonne au renderer la nouvelle TAILLE d'image ;
      //    - et on prévient AUSSI la chaîne du bloom de la nouvelle taille.
      //    (Le bloom est créé juste au-dessus : il existe donc déjà ici.)
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
      });

      // ⚙️ RÉGLAGE : à quelle vitesse le sol défile vers nous.
      //    Plus le nombre est grand, plus on a l'impression d'aller vite.
      //    👉 Amuse-toi à changer cette valeur (ex : 0.02, puis 0.2) !
      const vitesseSol = theme.vitesseSol;

      // 🟦 LE SOL : une grille de lignes (un quadrillage néon).
      //    Taille 20, divisée en 20 cases. La taille d'une case
      //    est ce qui rendra le défilement infini possible.
      const TAILLE = 20;
      const CASES = 20;
      // La taille d'une case, calculée à partir des deux valeurs ci-dessus.
      // Ainsi, si on change TAILLE ou CASES, le défilement reste juste.
      const tailleCase = TAILLE / CASES; // ici : 20 / 20 = 1
      const sol = new THREE.GridHelper(
        TAILLE,
        CASES,
        theme.couleurSolCentre, // couleur de la ligne du milieu
        theme.couleurSolLignes  // couleur des autres lignes
      );
      scene.add(sol);

      // 🟢 LE JOUEUR : un mesh = une FORME + une MATIÈRE (couleur).
      //    Forme : une petite boîte (largeur, hauteur, profondeur).
      const formeJoueur = new THREE.BoxGeometry(0.6, 0.6, 0.6);
      //    Matière : une couleur qui n'a pas besoin de lumière pour se voir
      //    (MeshBasicMaterial = "toujours visible", parfait pour le néon).
      const matiereJoueur = new THREE.MeshBasicMaterial({ color: theme.couleurJoueur });
      //    On assemble la forme et la matière → le mesh "joueur".
      const joueur = new THREE.Mesh(formeJoueur, matiereJoueur);
      //    On le place : x=0 (centre), y=0.3 (posé sur le sol), z=3 (près de nous).
      joueur.position.set(0, 0.3, 3);
      scene.add(joueur);

      // 🔴 LES OBSTACLES : des mesh (forme + couleur), comme le joueur.
      //    Forme et matière sont les MÊMES pour tous : on les crée une fois,
      //    puis on les réutilise pour chaque cube (c'est plus économe).
      const formeObstacle = new THREE.BoxGeometry(0.8, 0.8, 0.8);
      const matiereObstacle = new THREE.MeshBasicMaterial({ color: theme.couleurObstacle });

      // 🔴 RÉGLAGE : à quelle vitesse les obstacles foncent vers nous.
      //    👉 Plus c'est grand, plus c'est dur. Essaie 0.1, puis 0.25 !
      const vitesseObstacle = theme.vitesseObstacle;

      // 🚀 RÉGLAGE : de combien le facteur grandit à CHAQUE image (~60/seconde).
      //    Tout petit, sinon ça accélérerait beaucoup trop vite dès le début.
      //    👉 Essaie 0.00005 (montée plus douce) ou 0.0003 (ça grimpe plus fort) !
      const accelerationVitesse = theme.accelerationVitesse;

      // 🔴 RÉGLAGE : combien d'obstacles en même temps dans le couloir.
      //    👉 Essaie 1, puis 5 : le couloir se remplit !
      const NB_OBSTACLES = 3;

      // 🔴 RÉGLAGE : l'espacement entre deux obstacles au départ (en z).
      //    Plus c'est grand, plus ils arrivent espacés. 👉 Essaie 5, puis 12 !
      const ESPACEMENT_OBSTACLES = 8;

      // 🔴 RÉGLAGE : la profondeur (z) à laquelle un obstacle a disparu
      //    DERRIÈRE la caméra. Au-delà, on le recycle au fond.
      const zDisparition = 6;

      // 🎲 UNE RECETTE (fonction) : envoyer un obstacle TOUT AU FOND,
      //    sur une voie (gauche / centre / droite) tirée au hasard.
      function placerAuFond(obstacle) {
        // Math.random() donne un nombre au hasard entre 0 et 1.
        // (Math.random() * 5) → entre 0 et 5 ; "- 2.5" → entre -2.5 et +2.5.
        // Résultat : une position x au hasard sur toute la largeur du couloir.
        obstacle.position.x = Math.random() * 5 - 2.5;
        obstacle.position.z = -20;
      }

      // 📦 LE TABLEAU : une liste qui va contenir tous nos obstacles.
      const obstacles = [];

      // On fabrique NB_OBSTACLES cubes, espacés au départ pour ne pas
      // tous arriver collés. La boucle "for" répète NB_OBSTACLES fois.
      for (let i = 0; i < NB_OBSTACLES; i++) {
        const obstacle = new THREE.Mesh(formeObstacle, matiereObstacle);
        obstacle.position.y = 0.4;          // posé sur le sol
        placerAuFond(obstacle);              // voie au hasard, z = -20
        obstacle.position.z -= i * ESPACEMENT_OBSTACLES; // on décale chacun plus loin
        scene.add(obstacle);                 // on l'ajoute à la scène
        obstacles.push(obstacle);            // ...et au tableau
      }

      // 🟡 LES ORBES : des billes lumineuses à RAMASSER pour gagner des points.
      //    Forme : une SPHÈRE (une bille ronde). Les 3 nombres règlent
      //    le rayon (taille) et le "lissé" (plus c'est grand, plus c'est rond).
      const formeOrbe = new THREE.SphereGeometry(0.3, 16, 16);
      //    Matière : jaune doré, "toujours visible" comme le reste (néon).
      const matiereOrbe = new THREE.MeshBasicMaterial({ color: theme.couleurOrbe });

      // 🟡 RÉGLAGE : combien d'orbes en même temps dans le couloir.
      //    👉 Essaie 2, puis 6 : plus d'orbes = plus de points à ramasser !
      const NB_ORBES = 4;

      // 🟡 RÉGLAGE : l'espacement entre deux orbes au départ (en z).
      //    👉 Essaie 4, puis 10 !
      const ESPACEMENT_ORBES = 6;

      // 🎲 LA RECETTE pour renvoyer une orbe TOUT AU FOND, sur une voie
      //    LIBRE (sans cube juste à côté, sinon elle serait impossible à prendre).
      //    Méthode : on tire une voie au hasard, on VÉRIFIE, et on RECOMMENCE
      //    si ça ne va pas — avec une limite d'essais pour ne jamais bloquer.
      function placerOrbeAuFond(orbe) {
        for (let essai = 0; essai < 10; essai++) {
          orbe.position.x = Math.random() * 5 - 2.5; // voie au hasard
          orbe.position.z = -20;                      // tout au fond

          // On regarde chaque obstacle : y en a-t-il un sur la même voie
          // ET lui aussi vers le fond (donc qui voyagerait collé à l'orbe) ?
          let voieLibre = true;
          for (const obstacle of obstacles) {
            const memeVoie = Math.abs(obstacle.position.x - orbe.position.x) < 1;
            const aussiAuFond = obstacle.position.z < -10;
            if (memeVoie && aussiAuFond) {
              voieLibre = false; // raté : un cube occupe déjà cette voie
            }
          }

          // Voie dégagée ? On a trouvé, on arrête de chercher.
          if (voieLibre) return;
        }
      }

      // 📦 LE TABLEAU des orbes (comme le tableau des obstacles).
      const orbes = [];

      // On fabrique NB_ORBES billes, espacées au départ pour qu'elles
      // n'arrivent pas toutes collées.
      for (let i = 0; i < NB_ORBES; i++) {
        const orbe = new THREE.Mesh(formeOrbe, matiereOrbe);
        orbe.position.y = 0.4;          // posée un peu au-dessus du sol
        placerOrbeAuFond(orbe);         // voie au hasard, z = -20
        orbe.position.z -= i * ESPACEMENT_ORBES; // on décale chacune plus loin
        scene.add(orbe);                // on l'ajoute à la scène
        orbes.push(orbe);               // ...et au tableau
      }

      // ✨ LES PARTICULES (les étincelles à la collecte d'une orbe).
      //    Même astuce que les obstacles/orbes : une RÉSERVE d'objets qu'on
      //    recycle, au lieu d'en créer sans arrêt. Forme : un mini-cube.
      const formeParticule = new THREE.BoxGeometry(0.08, 0.08, 0.08);
      //    Couleur jaune doré, comme les orbes (le néon les fera briller).
      const matiereParticule = new THREE.MeshBasicMaterial({ color: theme.couleurParticule });

      // ✨ RÉGLAGE : taille de la réserve. Il en faut assez pour plusieurs
      //    gerbes en même temps. 👉 Essaie 20, puis 60 !
      const NB_PARTICULES = 40;

      // 📦 Le tableau des particules. Chaque case n'est PAS juste un mesh :
      //    c'est une petite "fiche" {mesh, vitesse vx/vy/vz, vie}.
      const particules = [];
      for (let i = 0; i < NB_PARTICULES; i++) {
        const mesh = new THREE.Mesh(formeParticule, matiereParticule);
        mesh.visible = false;           // invisible tant qu'on ne s'en sert pas
        scene.add(mesh);
        particules.push({ mesh, vx: 0, vy: 0, vz: 0, vie: 0 });
      }

      // ✨ RÉGLAGE : combien d'étincelles par gerbe. 👉 Essaie 6, puis 20 !
      const PARTICULES_PAR_GERBE = 12;

      // ✨ RÉGLAGE : la durée de vie d'une étincelle, EN IMAGES (~60/seconde).
      //    30 ≈ une demi-seconde. 👉 Essaie 15 (bref) ou 60 (ça traîne) !
      const VIE_PARTICULE = 30;

      // ✨ RÉGLAGE : à quelle vitesse les étincelles s'éparpillent.
      //    Plus c'est grand, plus la gerbe est large. 👉 Essaie 0.1 puis 0.4 !
      const VITESSE_PARTICULE = 0.2;

      // ✨ LA RECETTE "exploser" : réveiller une gerbe d'étincelles à l'endroit
      //    (x, y, z) donné. On parcourt la réserve, on saute celles déjà en vol,
      //    et on en lance PARTICULES_PAR_GERBE neuves, chacune dans une direction
      //    au hasard (mais plutôt vers le haut, pour l'effet "pop" qui jaillit).
      function exploser(x, y, z) {
        let lancees = 0;
        for (const p of particules) {
          if (p.vie > 0) continue;            // déjà en vol → on la laisse
          p.mesh.position.set(x, y, z);
          p.vx = (Math.random() - 0.5) * VITESSE_PARTICULE; // gauche/droite au hasard
          p.vy = Math.random() * VITESSE_PARTICULE;         // vers le haut (jaillissement)
          p.vz = (Math.random() - 0.5) * VITESSE_PARTICULE; // avant/arrière au hasard
          p.vie = VIE_PARTICULE;              // on (re)lance son compte à rebours
          p.mesh.visible = true;             // on la rend visible
          lancees++;
          if (lancees >= PARTICULES_PAR_GERBE) break; // gerbe complète
        }
      }

      // 🏁 L'ÉTAT DU JEU : un "panneau indicateur" qui dit dans quel écran on est.
      //    Il affiche un mot parmi trois :
      //      "accueil" = écran de départ (le jeu est figé, on attend) ;
      //      "jeu"     = on joue (le jeu bouge) ;
      //      "fini"    = on a perdu (écran de game over, figé).
      //    Règle d'or : le jeu ne BOUGE que quand etat vaut "jeu".
      let etat = "accueil";

      // 🚀 LE MULTIPLICATEUR DE VITESSE : un "bouton de volume" pour la vitesse.
      //    Il démarre à 1 (= vitesse normale) et grandit un tout petit peu à
      //    chaque image (de "accelerationVitesse"), ce qui fait accélérer le jeu
      //    en douceur. "let" car sa valeur CHANGE pendant la partie, comme le score.
      let facteurVitesse = 1;

      // 🔢 LE SCORE : notre compteur de points. Il démarre à 0 à chaque partie.
      //    "let" car sa valeur va CHANGER (à chaque orbe ramassée).
      let score = 0;

      // 🏆 LE MEILLEUR SCORE : on le LIT dans le "carnet" du navigateur.
      //    getItem renvoie du texte (ou rien la 1re fois) ; Number(...) le
      //    transforme en nombre, et "|| 0" met 0 s'il n'y a encore rien.
      let meilleurScore = Number(localStorage.getItem("meilleurScore")) || 0;

      // 🟡 RÉGLAGE : combien de points rapporte UNE orbe ramassée.
      //    👉 Mets 10, ou 50 : à toi de choisir la "valeur" d'une orbe !
      const pointsParOrbe = 10;

      // Un raccourci vers le panneau "GAME OVER" du HTML, pour l'afficher.
      const panneauGameOver = document.getElementById("gameover");

      // Un raccourci vers l'écran d'accueil, pour le cacher au démarrage.
      const ecranAccueil = document.getElementById("accueil");

      // Des raccourcis vers le score final, le record et le bouton "Rejouer".
      const scoreFinal = document.getElementById("scoreFinal");
      const recordFinal = document.getElementById("recordFinal");
      const boutonRejouer = document.getElementById("rejouer");

      // 🔄 LA RECETTE "reinitialiser" : on remet la partie à son état de départ.
      //    Utile pour rejouer SANS recharger la page : score à 0, joueur au
      //    centre, et tous les obstacles/orbes renvoyés au fond comme au début.
      function reinitialiser() {
        score = 0;                        // on repart de zéro point
        facteurVitesse = 1;               // ...et de la vitesse normale
        joueur.position.x = 0;            // le joueur revient au centre

        // On replace les obstacles comme à la création (au fond, espacés).
        for (let i = 0; i < obstacles.length; i++) {
          placerAuFond(obstacles[i]);
          obstacles[i].position.z -= i * ESPACEMENT_OBSTACLES;
        }
        // Pareil pour les orbes.
        for (let i = 0; i < orbes.length; i++) {
          placerOrbeAuFond(orbes[i]);
          orbes[i].position.z -= i * ESPACEMENT_ORBES;
        }

        zoneScore.textContent = "Score : 0"; // on remet l'affichage du score à 0
      }

      // ▶️ LA RECETTE "commencerPartie" : on lance une partie toute neuve.
      //    On réveille l'audio (le navigateur le met en pause au départ), on
      //    cache les deux écrans, on remet tout à zéro, et on passe sur "jeu".
      function commencerPartie() {
        if (audio.state === "suspended") audio.resume();
        ecranAccueil.style.display = "none";
        panneauGameOver.style.display = "none";
        reinitialiser();
        etat = "jeu";
      }

      // ▶️ Depuis l'ACCUEIL, on démarre au clic ou à n'importe quelle touche.
      //    La sécurité "etat === accueil" évite de relancer par erreur juste
      //    après un crash (sinon une touche redémarrerait aussitôt la partie).
      function demarrer() {
        if (etat !== "accueil") return;
        commencerPartie();
      }
      ecranAccueil.addEventListener("click", demarrer);
      window.addEventListener("keydown", demarrer);

      // ▶️ Depuis le GAME OVER, on rejoue UNIQUEMENT en cliquant le bouton.
      boutonRejouer.addEventListener("click", commencerPartie);

      // Un raccourci vers la zone "Score" du HTML, pour y écrire les points.
      const zoneScore = document.getElementById("score");

      // Un raccourci vers la zone "Record", et on y affiche le record lu.
      const zoneMeilleur = document.getElementById("meilleur");
      zoneMeilleur.textContent = "Record : " + meilleurScore;

      // 💥 RÉGLAGE : à quelle distance on considère que ça "touche".
      //    Plus c'est petit, plus il faut être pile dessus pour perdre.
      //    👉 Essaie 0.5 (plus permissif) ou 0.9 (plus sévère).
      const distanceCollision = 0.7;

      // 💥 LA RECETTE "est-ce que A touche B ?" : une SEULE fonction, utilisée
      //    pour les cubes ET pour les orbes. On regarde l'écart en x ET en z
      //    (Math.abs = la distance sans le signe). Elle renvoie true ou false.
      function touche(a, b) {
        const ecartX = Math.abs(a.position.x - b.position.x);
        const ecartZ = Math.abs(a.position.z - b.position.z);
        return ecartX < distanceCollision && ecartZ < distanceCollision;
      }

      // 🎮 RÉGLAGE : à quelle vitesse le joueur glisse sur les côtés.
      //    👉 À toi de l'ajuster plus tard (essaie 0.05, puis 0.3) !
      const vitesseJoueur = 0.12;

      // 🧱 RÉGLAGE : jusqu'où le joueur peut aller à gauche/droite avant
      //    de toucher le "mur invisible". On la règle À L'ŒIL : le but est
      //    que le cube s'arrête pile au bord de l'écran, sans en sortir.
      //    👉 À toi de tester : essaie 2.5, 3, 3.5... jusqu'à ce que ce soit parfait.
      const limiteJoueur = 2.5;

      // 🔊 L'ATELIER AUDIO : le "moteur" du navigateur qui fabrique des sons.
      //    (Le "|| window.webkitAudioContext" est une sécurité pour les vieux Safari.)
      const audio = new (window.AudioContext || window.webkitAudioContext)();

      // 🔊 LA RECETTE "jouerSon" : produire un bip court.
      //    - frequence : la hauteur du son, en Hz (grave = petit, aigu = grand).
      //    - duree     : combien de temps il dure, en secondes.
      function jouerSon(frequence, duree) {
        const oscillateur = audio.createOscillator(); // la SOURCE (la note)
        const volume = audio.createGain();            // le BOUTON DE VOLUME

        oscillateur.type = "square";            // forme de l'onde = "couleur" du son
        oscillateur.frequency.value = frequence; // la hauteur choisie
        oscillateur.connect(volume);            // la note passe par le volume...
        volume.connect(audio.destination);      // ...puis sort dans les haut-parleurs

        // On part d'un petit volume (0.2) et on le fait glisser vers ~0 :
        // le bip s'éteint en douceur, sans "clac" désagréable.
        const maintenant = audio.currentTime;
        volume.gain.setValueAtTime(0.2, maintenant);
        volume.gain.exponentialRampToValueAtTime(0.001, maintenant + duree);

        oscillateur.start(maintenant);          // on lance la note...
        oscillateur.stop(maintenant + duree);   // ...et on l'arrête après "duree"
      }

      // 🔊 RÉGLAGES DES SONS : on regroupe ICI les hauteurs et durées, au lieu
      //    de les laisser "en dur" au milieu de la boucle de jeu. Pour changer
      //    un son plus tard, tu modifies juste ces lignes, sans toucher au moteur.
      const SON_ORBE_HZ = 880;     // bip de collecte : aigu (grand nombre)
      const SON_ORBE_DUREE = 0.15; // ...et court
      const SON_CRASH_HZ = 70;     // boum de crash : grave (petit nombre)
      const SON_CRASH_DUREE = 0.4; // ...et plus long

      // 🕹️ ÉCOUTER LE CLAVIER.
      //    On retient simplement quelles flèches sont enfoncées,
      //    dans une "boîte" (un objet) avec deux cases : gauche et droite.
      const touches = { gauche: false, droite: false };

      // keydown = une touche vient d'être ENFONCÉE → on lève le drapeau.
      window.addEventListener("keydown", (e) => {
        // 🔊 Au tout premier appui, on "réveille" l'atelier audio (le navigateur
        //    le met en pause au départ tant que le joueur n'a rien fait).
        if (audio.state === "suspended") audio.resume();
        if (e.key === "ArrowLeft")  touches.gauche = true;
        if (e.key === "ArrowRight") touches.droite = true;
      });

      // keyup = une touche vient d'être RELÂCHÉE → on baisse le drapeau.
      window.addEventListener("keyup", (e) => {
        if (e.key === "ArrowLeft")  touches.gauche = false;
        if (e.key === "ArrowRight") touches.droite = false;
      });

      // 💥 LA RECETTE DE LA SECOUSSE : appelée à CHAQUE image.
      //    - Si "secousse" est > 0, on décale la caméra d'un petit montant
      //      AU HASARD (à gauche/droite et haut/bas), puis on RÉDUIT la secousse :
      //      à chaque image elle perd 10 % (× 0.9), donc le tremblement s'éteint
      //      tout seul, en douceur. Quand il devient minuscule, on le coupe net.
      //    - Si "secousse" vaut 0, on s'assure que la caméra est bien à sa place.
      function appliquerSecousse() {
        if (secousse > 0) {
          // (Math.random() - 0.5) donne un nombre entre -0.5 et +0.5 :
          // tantôt à gauche, tantôt à droite, d'où le tremblement.
          camera.position.x = cameraReposX + (Math.random() - 0.5) * secousse;
          camera.position.y = cameraReposY + (Math.random() - 0.5) * secousse;
          secousse *= 0.9;                 // le tremblement faiblit à chaque image
          if (secousse < 0.01) secousse = 0; // assez petit ? on arrête pour de bon
        } else {
          // Au repos : la caméra revient pile à sa position de départ.
          camera.position.x = cameraReposX;
          camera.position.y = cameraReposY;
        }
      }

      // 🔁 LA BOUCLE DE RENDU : rappelée ~60 fois par seconde.
      function animer() {
        requestAnimationFrame(animer); // redemande une nouvelle image

        // 💥 On applique la secousse AVANT tout le reste, pour que la caméra
        //    tremble même quand la partie est finie (juste après le crash).
        appliquerSecousse();

        // 🏁 SI ON N'EST PAS EN TRAIN DE JOUER (accueil ou game over) :
        //    on ne bouge plus rien. On dessine quand même l'image figée,
        //    puis on s'arrête là. Le jeu ne bouge QUE si etat vaut "jeu".
        if (etat !== "jeu") {
          composer.render();
          return;
        }

        // 🚀 ON ACCÉLÈRE : à chaque image, le facteur grandit un peu.
        //    Plus le temps passe, plus tout va vite. C'est la montée en difficulté.
        facteurVitesse += accelerationVitesse;

        // 🎮 DÉPLACER LE JOUEUR selon les flèches enfoncées.
        //    Flèche gauche → on diminue le x. Flèche droite → on augmente le x.
        if (touches.gauche) joueur.position.x -= vitesseJoueur;
        if (touches.droite) joueur.position.x += vitesseJoueur;

        // 🧱 LE MUR INVISIBLE : on empêche le joueur de sortir de l'écran.
        //    Si x dépasse la limite (à droite ou à gauche), on le ramène.
        if (joueur.position.x > limiteJoueur)  joueur.position.x = limiteJoueur;
        if (joueur.position.x < -limiteJoueur) joueur.position.x = -limiteJoueur;

        // 🔴 FAIRE AVANCER TOUS LES OBSTACLES vers nous.
        //    On parcourt le tableau et on traite chaque obstacle un par un.
        for (const obstacle of obstacles) {
          obstacle.position.z += vitesseObstacle * facteurVitesse;

          // Dès qu'il nous a dépassés (z plus grand que la caméra),
          // on le renvoie au fond sur une NOUVELLE voie au hasard.
          if (obstacle.position.z > zDisparition) {
            placerAuFond(obstacle);
          }

          // 💥 Si le joueur touche ce cube → game over.
          if (touche(joueur, obstacle)) {
            etat = "fini";                       // on gèle le jeu
            secousse = FORCE_SECOUSSE;           // 💥 on lance le tremblement !
            jouerSon(SON_CRASH_HZ, SON_CRASH_DUREE); // 🔊 un "boum" grave et plus long
            scoreFinal.textContent = "Score : " + score; // on affiche le score de la partie
            recordFinal.textContent = "Record : " + meilleurScore; // ...et le record
            panneauGameOver.style.display = "flex"; // on affiche le panneau
          }
        }

        // 🟡 FAIRE AVANCER TOUTES LES ORBES vers nous (comme les obstacles).
        for (const orbe of orbes) {
          orbe.position.z += vitesseObstacle * facteurVitesse;

          // Dès qu'elle nous a dépassés, on la renvoie au fond.
          if (orbe.position.z > zDisparition) {
            placerOrbeAuFond(orbe);
          }

          // ✨ Si le joueur touche cette orbe → on la RAMASSE !
          if (touche(joueur, orbe)) {
            score += pointsParOrbe;            // on ajoute les points
            // 💥 La gerbe d'étincelles JAILLIT là où était l'orbe (avant
            //    de la recycler, sinon sa position aurait déjà changé).
            exploser(orbe.position.x, orbe.position.y, orbe.position.z);
            jouerSon(SON_ORBE_HZ, SON_ORBE_DUREE); // 🔊 un petit bip aigu et court
            placerOrbeAuFond(orbe);            // l'orbe repart au fond (recyclée)
            zoneScore.textContent = "Score : " + score; // on met à jour l'affichage

            // 🏆 Vient-on de DÉPASSER le record ? Si oui, on le met à jour
            //    EN DIRECT (affichage + enregistrement dans le carnet).
            if (score > meilleurScore) {
              meilleurScore = score;
              localStorage.setItem("meilleurScore", meilleurScore);
              zoneMeilleur.textContent = "Record : " + meilleurScore;
            }
          }
        }

        // ✨ FAIRE VIVRE LES ÉTINCELLES : on parcourt la réserve et on ne
        //    traite que celles "en vol" (vie > 0). Pour chacune :
        //    - on la déplace selon sa vitesse,
        //    - on baisse sa vie d'une unité (le compte à rebours),
        //    - on la fait RÉTRÉCIR au fur et à mesure (t va de 1 vers 0),
        //    - et quand sa vie atteint 0, on la rend invisible (recyclable).
        for (const p of particules) {
          if (p.vie <= 0) continue;
          p.mesh.position.x += p.vx;
          p.mesh.position.y += p.vy;
          p.mesh.position.z += p.vz;
          p.vie -= 1;
          const fraction = p.vie / VIE_PARTICULE; // 1 au début → 0 à la fin
          p.mesh.scale.setScalar(fraction);       // taille proportionnelle à la vie
          if (p.vie <= 0) p.mesh.visible = false;
        }

        // On glisse le sol vers nous (vers les z positifs).
        sol.position.z += vitesseSol * facteurVitesse;

        // L'astuce du défilement infini : dès que le sol a glissé
        // d'une case complète, on le remet en arrière d'une case.
        // Comme toutes les cases sont identiques, le saut est invisible.
        if (sol.position.z >= tailleCase) {
          sol.position.z -= tailleCase;
        }

        composer.render(); // la chaîne dessine l'image PUIS ajoute le halo néon
      }

      animer(); // on lance la boucle
    </script>
  </body>
</html>
